<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <title>No-Man-Band</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ── Clean theme (default) ── */
      html,
      html[data-theme="clean"] {
        --body-bg: #1a1a2e;
        --body-color: #e0e0e0;

        --card-bg: rgba(22, 33, 62, 0.92);
        --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        --card-border: none;

        --border-subtle: rgba(255, 255, 255, 0.06);
        --divider: #333;
        --toggle-border: rgba(255, 255, 255, 0.1);

        --btn-bg: #0f3460;
        --btn-color: #e0e0e0;
        --btn-disabled-bg: #2a2a4a;
        --stop-bg: #e94560;
        --pause-active-bg: #e0a030;
        --toggle-active-bg: #0f3460;
        --mode-active-bg: #e94560;
        --mode-inactive-bg: #2a2a4a;
        --mode-active-color: #fff;
        --mode-inactive-color: #aaa;

        --remove-bg: #3a1a1a;
        --randomize-bg: #3a3a6a;
        --randomize-flash: #6a6aaa;

        --select-bg: #2a2a4a;
        --select-color: #e0e0e0;

        --label-color: #aaa;

        --selected-bg: rgba(15, 52, 96, 0.4);

        --transport-color: #ccc;
        --transport-active-color: #4ecca3;

        --dot-connected: #4ecca3;
        --dot-connected-shadow: 0 0 6px rgba(78, 204, 163, 0.5);
        --dot-disconnected: #e94560;
        --dot-disconnected-shadow: none;

        --time-div-inactive: #2a2a4a;

        --slider-fill: rgba(140, 140, 255, 0.5);
        --slider-thumb: #8888ff;
        --slider-thumb-border: rgba(255, 255, 255, 0.3);
        --slider-thumb-shadow: none;

        --title-text-color: #ccc;
        --section-label-color: #777;
        --row-label-color: #666;

        --note-chip-bg: rgba(255, 255, 255, 0.08);
        --note-chip-color: #ccc;
        --note-rest-color: #555;

        --small-btn-bg: #1a1a3a;
        --small-btn-color: #888;

        --toggle-btn-color: #c0c0c0;
      }

      /* ── Retro synthwave theme ── */
      html[data-theme="retro"] {
        --body-bg: #0a0a1a;
        --body-color: #e8d5f5;

        --card-bg: rgba(15, 10, 35, 0.92);
        --card-shadow:
          0 8px 32px rgba(0, 0, 0, 0.6), 0 0 60px rgba(180, 70, 220, 0.08),
          inset 0 1px 0 rgba(180, 70, 220, 0.1);
        --card-border: 1px solid rgba(180, 70, 220, 0.12);

        --border-subtle: rgba(180, 70, 220, 0.1);
        --divider: rgba(180, 70, 220, 0.15);
        --toggle-border: rgba(180, 70, 220, 0.2);

        --btn-bg: #6b1d9e;
        --btn-color: #e8d5f5;
        --btn-disabled-bg: #1a0a30;
        --stop-bg: #ff2d75;
        --pause-active-bg: #e0a030;
        --toggle-active-bg: #6b1d9e;
        --mode-active-bg: #ff2d75;
        --mode-inactive-bg: #1a0a30;
        --mode-active-color: #fff;
        --mode-inactive-color: #9080a8;

        --remove-bg: #3a0a20;
        --randomize-bg: #6b1d9e;
        --randomize-flash: #b347d9;

        --select-bg: #1a0a30;
        --select-color: #e8d5f5;

        --label-color: #9080a8;

        --selected-bg: rgba(107, 29, 158, 0.2);

        --transport-color: #c0a8d8;
        --transport-active-color: #00f0ff;

        --dot-connected: #00f0ff;
        --dot-connected-shadow: 0 0 8px rgba(0, 240, 255, 0.5);
        --dot-disconnected: #ff2d75;
        --dot-disconnected-shadow: 0 0 4px rgba(255, 45, 117, 0.3);

        --time-div-inactive: #1a0a30;

        --slider-fill: rgba(255, 45, 117, 0.45);
        --slider-thumb: #ff2d75;
        --slider-thumb-border: rgba(255, 45, 117, 0.5);
        --slider-thumb-shadow: 0 0 6px rgba(255, 45, 117, 0.4);

        --title-text-color: #e8d5f5;
        --section-label-color: #9080a8;
        --row-label-color: #7060a0;

        --note-chip-bg: rgba(180, 70, 220, 0.1);
        --note-chip-color: #c0a8d8;
        --note-rest-color: #4a3a6a;

        --small-btn-bg: #120820;
        --small-btn-color: #9080a8;

        --toggle-btn-color: #c0a8d8;
      }

      body {
        background-color: var(--body-bg);
        color: var(--body-color);
        min-height: 100vh;
        overflow-x: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      html[data-theme="retro"] body {
        background: none;
      }
      html[data-theme="retro"] body::before {
        content: "";
        position: fixed;
        inset: -10%;
        width: 120%;
        height: 120%;
        background: url("/bg.png") center center / cover no-repeat;
        z-index: -1;
        animation: bgZoom 30s ease-in-out infinite alternate;
        transform-origin: top center;
      }
      @keyframes manualBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      @keyframes bgZoom {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.08);
        }
      }

      input[type="range"].dual-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        pointer-events: all;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--slider-thumb);
        border: 1px solid var(--slider-thumb-border);
        cursor: pointer;
        box-shadow: var(--slider-thumb-shadow);
      }
      input[type="range"].dual-range::-moz-range-thumb {
        pointer-events: all;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--slider-thumb);
        border: 1px solid var(--slider-thumb-border);
        cursor: pointer;
        box-shadow: var(--slider-thumb-shadow);
      }
      @keyframes crtBlink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      .crt-input {
        caret-color: transparent;
      }
      .crt-cursor {
        display: inline-block;
        width: 9px;
        height: 1.1em;
        background: #39ff14;
        box-shadow: 0 0 4px #39ff14;
        vertical-align: text-bottom;
        animation: crtBlink 1s step-end infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
